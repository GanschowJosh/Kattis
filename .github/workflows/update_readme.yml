name: Update README

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install autokattis python-dotenv seaborn

      - name: Run README generator
        env:
          KATTIS_PASSWORD: ${{ secrets.KATTIS_PASSWORD }}
        run: |
          echo "kattis_password=$KATTIS_PASSWORD" > .env
          python create_readme.py
          mv out README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md
          git diff --cached --quiet || git commit -m "Update README"
          git push
